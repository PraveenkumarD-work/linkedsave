<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 280px;
        font-family: system-ui, sans-serif;
        padding: 16px;
        color: #0f1115;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 4px;
      }
      p.sub {
        font-size: 12px;
        color: #6b7280;
        margin: 0 0 14px;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 4px;
        margin-top: 10px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 9px;
        font-size: 13px;
        border: 1px solid #e6e7eb;
        border-radius: 8px;
      }
      button {
        margin-top: 14px;
        width: 100%;
        padding: 9px;
        background: #4f46e5;
        color: #fff;
        border: none;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
      }
      #lastResult {
        margin-top: 14px;
        padding-top: 10px;
        border-top: 1px solid #e6e7eb;
        font-size: 12px;
        color: #6b7280;
      }
      a {
        color: #4f46e5;
      }
    </style>
  </head>
  <body>
    <h1>PostVault Importer</h1>
    <p class="sub">Generate a key at <code>/app/developer</code>, paste it below.</p>

    <label>API base URL</label>
    <input id="apiBaseUrl" placeholder="https://postvault-clone.netlify.app" />

    <label>API key</label>
    <input id="apiKey" type="password" placeholder="pv_live_…" />

    <button id="save">Save</button>
    <div id="status"></div>
    <div id="lastResult"></div>

    <script src="popup.js"></script>
  </body>
</html>
